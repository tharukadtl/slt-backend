spring:
  datasource:
    url: jdbc:mysql://localhost:3306/slt_fieldops_db?useSSL=false&serverTimezone=Asia/Colombo&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    time-zone: Asia/Colombo

server:
  port: 8080

# ── THIS IS WHAT WAS MISSING ──────────────────────────────────────────────────
app:
  jwt:
    secret: SLT-FieldOps-JWT-Secret-Key-2026-LLCSX25311-Tharuka-Very-Long-Secure-Key-Min-64-Chars
    access-token-expiry-ms: 1800000      # 30 minutes
    refresh-token-expiry-ms: 604800000   # 7 days
  otp:
    expiry-minutes: 5
    max-attempts: 3
  sms:
    enabled: false       # false = OTP prints to console. Set true only when you have real SMS.
    provider: mock
# ─────────────────────────────────────────────────────────────────────────────

logging:
  level:
    lk.slt.fieldops: DEBUG
    org.springframework.security: INFO