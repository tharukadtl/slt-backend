spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.usgyysfbchyuiclzdgis}
    password: ${SPRING_DATASOURCE_PASSWORD:Tharuka@123}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  jackson:
    time-zone: Asia/Colombo
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  websocket:
    message-size-limit: 8192
    send-buffer-size-limit: 512000
    send-time-limit: 20000

server:
  port: ${SERVER_PORT:8080}

# ══════════════════════════════════════════════════════════
# APP CONFIG
# ══════════════════════════════════════════════════════════
app:

  # ── JWT ─────────────────────────────────────────────────
  jwt:
    secret: ${JWT_SECRET:SLT-FieldOps-JWT-Secret-Key-2026-LLCSX25311-Tharuka-Very-Long-Secure-Key-Min-64-Chars}
    access-token-expiry-ms: ${JWT_EXPIRATION_MS:1800000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  # ── OTP ─────────────────────────────────────────────────
  otp:
    expiry-minutes: 5
    max-attempts: 3

  # ── SMS ─────────────────────────────────────────────────
  sms:
    enabled: false
    provider: mock

  # ── Firebase Push Notifications ─────────────────────────
  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:src/main/resources/firebase/serviceAccountKey.json}
    enabled: false
    project-id: ${FIREBASE_PROJECT_ID:slt-fieldops}

  # ── WebSocket ────────────────────────────────────────────
  websocket:
    location-endpoint: /ws/location
    notification-endpoint: /ws/notifications
    allowed-origins: "*"

  # ── CORS ─────────────────────────────────────────────────
  cors:
    allowed-origins:
      - ${ALLOWED_ORIGINS:http://localhost:3000}
      - http://localhost:3001
      - http://localhost:8081
      - http://localhost:19000
      - http://localhost:19001
      - http://10.0.2.2:8080
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  # ── Stock Alerts ─────────────────────────────────────────
  stock:
    low-stock-check-interval-minutes: 30
    alert-enabled: true

  # ── Reports ──────────────────────────────────────────────
  reports:
    export-dir: temp/reports
    max-export-days: 90

  # ── KPI ──────────────────────────────────────────────────
  kpi:
    calculation-interval-hours: 1
    leaderboard-cache-minutes: 15

  # ── Location ─────────────────────────────────────────────
  location:
    active-threshold-minutes: 30
    update-interval-seconds: 30

# ══════════════════════════════════════════════════════════
# LOGGING
# ══════════════════════════════════════════════════════════
logging:
  level:
    lk.slt.fieldops: DEBUG
    lk.slt.fieldops.websocket: DEBUG
    lk.slt.fieldops.service: DEBUG
    lk.slt.fieldops.controller: INFO
    org.springframework.security: INFO
    org.springframework.web.socket: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/slt-fieldops.log
    max-size: 10MB
    max-history: 30

# ══════════════════════════════════════════════════════════
# ACTUATOR — Health Monitoring
# ══════════════════════════════════════════════════════════
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, env
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

